<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>神経衰弱</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
  text-align: center;
}

h1 {
  font-size: 18px;
  margin: 10px 0;
}

#info {
  margin: 5px;
  font-size: 16px;
}

#board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 10px;
  max-width: 400px;
  margin: auto;
}

.card {
  aspect-ratio: 1;
  background: #444;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 26px;
  user-select: none;
  transition: transform 0.1s;
}

.card:active {
  transform: scale(0.95);
}

.open {
  color: #111;
}

.matched {
  opacity: 0.4;
}

/* 色 */
.wang { background: #e74c3c; }
.meng { background: #3498db; }
.tai  { background: #2ecc71; }
.feng { background: #f1c40f; }
.xin  { background: #9b59b6; }
.wei  { background: #e67e22; }
.zai  { background: #1abc9c; }
.zhuan { background: #ecf0f1; color:#111; }

#restart {
  display: none;
  margin: 10px;
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<h1>神経衰弱（ミス5回まで）</h1>
<div id="info">ミス残り：5</div>
<div id="board"></div>
<button id="restart">もう一回</button>

<script>
const pairs = [
  {char:"旺", cls:"wang"},
  {char:"蒙", cls:"meng"},
  {char:"泰", cls:"tai"},
  {char:"楓", cls:"feng"},
  {char:"辛", cls:"xin"},
  {char:"威", cls:"wei"},
  {char:"仔", cls:"zai"},
  {char:"傳", cls:"zhuan"}
];

const board = document.getElementById("board");
const info = document.getElementById("info");
const restartBtn = document.getElementById("restart");

let first, second, lock, miss, cleared;

// 初期化
restartBtn.addEventListener("click", initGame);

function initGame() {
  board.innerHTML = "";
  first = null;
  second = null;
  lock = true;
  miss = 5;
  cleared = 0;

  info.textContent = "ミス残り：5";
  restartBtn.style.display = "none";

  let cardsData = [];
  pairs.forEach(p => {
    cardsData.push({...p});
    cardsData.push({...p});
  });

  cardsData.sort(() => Math.random() - 0.5);

  cardsData.forEach(data => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.char = data.char;
    card.dataset.cls = data.cls;
    card.textContent = "";
    board.appendChild(card);

    card.addEventListener("click", () => onClick(card));
  });

  revealAll();

  setTimeout(() => {
    hideAll();
    lock = false;
  }, 2000);
}

// 全表示
function revealAll() {
  document.querySelectorAll(".card").forEach(c => {
    c.textContent = c.dataset.char;
    c.classList.add("open", c.dataset.cls);
  });
}

// 全伏せ（未確定のみ）
function hideAll() {
  document.querySelectorAll(".card").forEach(c => {
    if (!c.classList.contains("matched")) {
      c.textContent = "";
      c.classList.remove("open");
      c.classList.remove(c.dataset.cls);
    }
  });
}

// クリック処理
function onClick(card) {
  if (lock || card.classList.contains("matched") || card === first) return;

  card.textContent = card.dataset.char;
  card.classList.add("open", card.dataset.cls);

  if (!first) {
    first = card;
  } else {
    second = card;
    lock = true;

    if (first.dataset.char === second.dataset.char) {
      first.classList.add("matched");
      second.classList.add("matched");

      cleared += 2;

      first = null;
      second = null;
      lock = false;

      if (cleared === 16) {
        info.textContent = "クリア！";
        restartBtn.style.display = "inline-block";
      }

    } else {
      miss--;
      info.textContent = "ミス残り：" + miss;

      if (miss <= 0) {
        info.textContent = "ゲームオーバー";
        setTimeout(revealAll, 300);
        restartBtn.style.display = "inline-block";
        return;
      }

      setTimeout(() => {
        first.textContent = "";
        second.textContent = "";
        first.classList.remove("open", first.dataset.cls);
        second.classList.remove("open", second.dataset.cls);
        first = null;
        second = null;
        lock = false;
      }, 600);
    }
  }
}

// 最初に実行
initGame();
</script>

</body>
</html>
